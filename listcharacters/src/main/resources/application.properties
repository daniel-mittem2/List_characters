spring.application.name=listcharacters

# setup connessione database
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:listcharacters}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:gojo}

# configurazioni per JPA
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always
spring.jpa.show-sql=true

# limite upload file
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB