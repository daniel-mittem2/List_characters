<!DOCTYPE html>
<html xmlns="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">
    <title th:text="#{detail.title}">Scheda ninja</title>
    <style>
        body { background: #0d0d1a; }
        .badge-cat { background: #3b1fa0; color: #c4b5fd; font-size: 11px; padding: 3px 10px; border-radius: 99px; }
        .field-label { color: #7c75b5; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
        .field-value { color: #e8e0ff; font-size: 14px; font-weight: 500; }
    </style>
</head>
<body>

<div class="container py-3" style="max-width:420px;">

    <div class="d-flex align-items-center gap-2 p-2 mb-3 rounded-3" style="background:#120d30; border:1px solid #3b2fa0;">
        <span style="font-size:18px;">⛩</span>
        <h2 class="mb-0 flex-grow-1 fw-medium" style="color:#c4b5fd; font-size:15px;"
            th:text="#{detail.title}">Scheda ninja</h2>

        <div class="d-flex gap-1">
            <a th:href="@{/characters(id=${characters.id}, lang=it)}" class="btn btn-sm py-0 fw-medium"
            style="background:#2e2860; color:#a89fe8; font-size:11px; border:1px solid #3b2fa0;">🇮🇹</a>
            <a th:href="@{/characters(id=${characters.id}, lang=en)}" class="btn btn-sm py-0 fw-medium"
            style="background:#2e2860; color:#a89fe8; font-size:11px; border:1px solid #3b2fa0;">EN</a>
            <a th:href="@{/characters(id=${characters.id}, lang=ja)}" class="btn btn-sm py-0 fw-medium"
            style="background:#2e2860; color:#a89fe8; font-size:11px; border:1px solid #3b2fa0;">🇯🇵</a>
        </div>

        <a th:href="@{/}" class="btn btn-sm fw-medium"
           style="background:#2e2860; color:#a89fe8; font-size:12px; border:1px solid #3b2fa0;"
           th:text="#{detail.back}">← Villaggio</a>
    </div>

    <div class="alert border-0 mb-3 py-2 px-3" role="alert"
         th:if="${newCharacters != null}"
         style="background:#1c3a2a; color:#7de8b0; font-size:13px;"
         th:text="#{detail.saved}">
        Ninja registrato nel Bingo Book
    </div>

    <div class="rounded-3 overflow-hidden" style="border:1px solid #3b2fa0;">
        <img th:if="${characters.immagine}" th:src="@{${characters.immagine}}" alt="immagine"
             style="width:100%; height:200px; object-fit:cover; display:block;">
        <div class="p-3" style="background:#120d30;">
            <div class="row g-3">
                <div class="col-6">
                    <div class="field-label" th:text="#{character.name}">Nome</div>
                    <div class="field-value" th:text="${characters.nome}"></div>
                </div>
                <div class="col-6">
                    <div class="field-label" th:text="#{character.surname}">Cognome</div>
                    <div class="field-value" th:text="${characters.cognome}"></div>
                </div>
                <div class="col-6">
                    <div class="field-label" th:text="#{character.opera}">Opera</div>
                    <div class="field-value" th:text="${characters.opera}"></div>
                </div>
                <div class="col-6">
                    <div class="field-label" th:text="#{character.category}">Categoria</div>
                    <div class="field-value">
                        <span class="badge-cat" th:text="${characters.categoria}"></span>
                    </div>
                </div>
                <div class="col-6">
                    <div class="field-label" th:text="#{character.birthday}">Compleanno</div>
                    <div class="field-value" th:text="${#temporals.format(characters.compleanno, 'dd/MM/yyyy')}"></div>
                </div>
                <div class="col-6">
                    <div class="field-label" th:text="#{detail.field.sesso}">Sesso</div>
                    <div class="field-value" th:text="${characters.sesso}"></div>
                </div>
            </div>
        </div>
    </div>

</div>

<script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
