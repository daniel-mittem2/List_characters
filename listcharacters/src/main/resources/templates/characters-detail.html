<!DOCTYPE html>
<html xmlns="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">
    <title>Dettagli personaggio</title>
</head>
<body>
    <div class="container mt-4">
        <a th:href="@{/}" class="btn btn-secondary btn-sm mb-3">Torna alla lista</a>

        <h2>Dettagli personaggio</h2>

        <div class="card" style="max-width: 400px;">
            <img th:if="${characters.immagine}" th:src="@{${characters.immagine}}" class="card-img-top" alt="immagine" style="max-height: 300px; object-fit: cover;">
            <div class="card-body">
                <p><strong>Nome:</strong> <span th:text="${characters.nome}"></span></p>
                <p><strong>Cognome:</strong> <span th:text="${characters.cognome}"></span></p>
                <p><strong>Opera:</strong> <span th:text="${characters.opera}"></span></p>
                <p><strong>Categoria:</strong> <span th:text="${characters.categoria}"></span></p>
                <p><strong>Compleanno:</strong> <span th:text="${characters.compleanno}"></span></p>
            </div>
        </div>
    </div>

    <script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
