<!DOCTYPE html>
<html xmlns="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">
    <title>Characters Form</title>
    <style>
        body { background: #0d0d1a; }
        .form-control, .form-select {
            background: #13132b !important; color: #e8e0ff !important;
            border-color: #3b2fa0 !important; font-size: 13px;
        }
        .form-control::placeholder { color: #7c75b5 !important; }
        .form-control:focus, .form-select:focus {
            box-shadow: 0 0 0 2px #6d5fd4 !important; border-color: #6d5fd4 !important;
        }
        .form-control[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.7) sepia(1) hue-rotate(220deg); }
        label { color: #a89fe8; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="container py-3" style="max-width:500px;">

    <div class="d-flex align-items-center gap-2 p-2 mb-3 rounded-3" style="background:#120d30; border:1px solid #3b2fa0;">
        <span style="font-size:18px;">⛩</span>
        <h2 class="mb-0 flex-grow-1 fw-medium" style="color:#c4b5fd; font-size:15px;"
            th:text="${isEdit} ? 'Modifica personaggio' : 'Nuovo personaggio anime'">
            Personaggio anime
        </h2>
        <a th:href="@{/}" class="btn btn-sm fw-medium" style="background:#2e2860; color:#a89fe8; font-size:12px; border:1px solid #3b2fa0;">← Torna alla lista</a>
    </div>

    <div class="p-3 rounded-3" style="background:#120d30; border:1px solid #3b2fa0;">
        <form method="post"
              th:action="${isEdit} ? @{/character/edit/{id}(id=${characterForm.id})} : @{/new}"
              th:object="${characterForm}"
              enctype="multipart/form-data">

            <input th:if="${isEdit}" th:field="*{id}" type="hidden">

            <div class="row g-2 mb-2">
                <div class="col-6">
                    <label>Nome</label>
                    <input th:field="*{nome}" type="text" class="form-control form-control-sm" placeholder="es. Naruto">
                    <span th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}" class="text-danger" style="font-size:11px;"></span>
                </div>
                <div class="col-6">
                    <label>Cognome</label>
                    <input th:field="*{cognome}" type="text" class="form-control form-control-sm" placeholder="es. Uzumaki">
                    <span th:if="${#fields.hasErrors('cognome')}" th:errors="*{cognome}" class="text-danger" style="font-size:11px;"></span>
                </div>
            </div>

            <div class="row g-2 mb-2">
                <div class="col-6">
                    <label>Opera</label>
                    <input th:field="*{opera}" type="text" class="form-control form-control-sm" placeholder="es. Naruto">
                    <span th:if="${#fields.hasErrors('opera')}" th:errors="*{opera}" class="text-danger" style="font-size:11px;"></span>
                </div>
                <div class="col-6">
                    <label>Categoria</label>
                    <input th:field="*{categoria}" type="text" class="form-control form-control-sm" placeholder="es. Shonen">
                    <span th:if="${#fields.hasErrors('categoria')}" th:errors="*{categoria}" class="text-danger" style="font-size:11px;"></span>
                </div>
            </div>

            <div class="mb-2">
                <label>Data di compleanno</label>
                <input th:field="*{compleanno}" type="date" class="form-control form-control-sm">
                <span th:if="${#fields.hasErrors('compleanno')}" th:errors="*{compleanno}" class="text-danger" style="font-size:11px;"></span>
            </div>

            <div class="col-6">
                <label>Sesso</label>
                <select th:field="*{sesso}" class="form-control form-control-sm">
                    <option value="">-- Seleziona --</option>
                    <option value="M">Maschio</option>
                    <option value="F">Femmina</option>
                    <option value="Altro">Altro</option>
                </select>
                <span th:if="${#fields.hasErrors('sesso')}" th:errors="*{sesso}" class="text-danger" style="font-size:11px;"></span>
            </div>

            <div class="mb-3">
                <label>Immagine</label>

                <!-- mostra preview immagine attuale solo in edit -->
                <div th:if="${isEdit != null and isEdit and characterForm.immagineAttuale != null}" class="mb-2">
                    <img th:src="@{${characterForm.immagineAttuale}}"
                        style="height:80px; width:80px; object-fit:cover; border-radius:8px; border:2px solid #3b2fa0;">
                    <p style="color:#7c75b5; font-size:11px; margin-top:4px;">Immagine attuale — lascia vuoto per mantenerla</p>
                </div>

                <input th:field="*{immagine}" type="file" accept="image/*" class="form-control form-control-sm">
                <!-- campo hidden per passare il path attuale -->
                <input type="hidden" th:field="*{immagineAttuale}">

                <span th:if="${#fields.hasErrors('immagine')}" th:errors="*{immagine}" class="text-danger" style="font-size:11px;"></span>
            </div>

            <div class="d-flex gap-2">
                <input class="btn btn-sm fw-medium" type="submit"
                       th:value="${isEdit} ? 'Modifica' : 'Aggiungi'"
                       style="background:#6d5fd4; color:#fff; font-size:12px;">
                <input class="btn btn-danger btn-sm fw-medium" type="reset" value="Svuota" style="font-size:12px;">
            </div>

        </form>
    </div>

</div>

<script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
