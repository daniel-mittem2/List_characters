<!DOCTYPE html>
<html xmlns="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">
    <title>Characters Form</title>
</head>
<body>
    <div>
        <a th:href="@{/}" class="btn btn-secondary btn-sm">Torna alla lista</a>
    </div>

    <div>
        <form method="post" 
              th:action="${isEdit} ? @{/character/edit/{id}(id=${characterForm.id})} : @{/new}" 
              th:object="${characterForm}" 
              enctype="multipart/form-data">
            
            <!-- Campo nascosto per l'ID durante la modifica -->
            <input th:if="${isEdit}" th:field="*{id}" type="hidden">
            
            <div>
                <label>Nome:</label>
                <input th:field="*{nome}" type="text">
            
                <!-- Messaggio d'errore -->
                <div th:if="${#fields.hasErrors('nome')}">
                                <span th:errors="*{nome}" class="text-danger"></span>
                </div>
            </div>



            <div>
                <label>Cognome:</label>
                <input th:field="*{cognome}" type="text">

                <div th:if="${#fields.hasErrors('cognome')}">
                                <span th:errors="*{cognome}" class="text-danger"></span>
                </div>
            </div>


            <div>
                <label>Opera:</label>
                <input th:field="*{opera}" type="text">

                <div th:if="${#fields.hasErrors('opera')}">
                                <span th:errors="*{opera}" class="text-danger"></span>
                </div>
            </div>


            <div>
                <label>Categoria:</label>
                <input th:field="*{categoria}" type="text">
                
                <div th:if="${#fields.hasErrors('categoria')}">
                                <span th:errors="*{categoria}" class="text-danger"></span>
                </div>
            </div>


            <div>
                <label>Data di compleanno:</label>
                <input th:field="*{compleanno}" type="date">

                <div th:if="${#fields.hasErrors('compleanno')}">
                                <span th:errors="*{compleanno}" class="text-danger"></span>
                </div>
            </div>



            <div>
                <label>Immagine:</label>
                <input th:field="*{immagine}" type="file" accept="image/*">
                <div th:if="${#fields.hasErrors('immagine')}">
                    <span th:errors="*{immagine}" class="text-danger"></span>
                </div>
            </div>

            <div>
                <input class="btn btn-primary" type="submit" th:value="${isEdit} ? 'Modifica' : 'Aggiungi'">
                <input class="btn btn-danger" type="reset" value="Svuota">
            </div>
        </form>
    </div>
    <script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
