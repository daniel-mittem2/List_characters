<!DOCTYPE html>
<html xmlns="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
    <title>Characters List</title>
    <style>
        :root {
            --anime-bg: #0d0d1a;
            --anime-panel: #13132a;
            --anime-border: #2a2a5a;
            --anime-pink: #ff2d78;
            --anime-cyan: #00e5ff;
            --anime-gold: #ffd600;
            --anime-purple: #9b59f5;
            --anime-text: #e8e8ff;
            --anime-muted: #8080b0;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--anime-bg);
            color: var(--anime-text);
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                repeating-linear-gradient(-45deg, transparent, transparent 60px, rgba(255,45,120,0.07) 60px, rgba(255,45,120,0.07) 62px),
                repeating-linear-gradient(45deg, transparent, transparent 80px, rgba(0,229,255,0.03) 80px, rgba(0,229,255,0.03) 81px);
            pointer-events: none;
            z-index: 0;
        }

        .page-wrapper {
            position: relative;
            z-index: 1;
            padding: 24px 20px 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* HEADER */
        .anime-header { text-align: center; margin-bottom: 32px; position: relative; }
        .anime-header::before {
            content: '★ ANIME DATABASE ★';
            display: block;
            font-family: 'Bangers', cursive;
            font-size: 11px;
            letter-spacing: 6px;
            color: var(--anime-cyan);
            margin-bottom: 6px;
            opacity: 0.7;
        }

        .anime-title {
            font-family: 'Bangers', cursive;
            font-size: clamp(2.2rem, 6vw, 4rem);
            letter-spacing: 3px;
            line-height: 1;
            background: linear-gradient(135deg, var(--anime-pink) 0%, var(--anime-gold) 50%, var(--anime-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-block;
            margin: 0;
        }

        .subtitle-decoration {
            display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 10px;
        }
        .subtitle-decoration .line {
            height: 2px; width: 60px;
            background: linear-gradient(90deg, transparent, var(--anime-pink));
        }
        .subtitle-decoration .line.right { background: linear-gradient(90deg, var(--anime-pink), transparent); }
        .subtitle-decoration span {
            color: var(--anime-pink); font-size: 12px; font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase;
        }

        /* BUTTONS */
        .btn-anime-primary {
            background: linear-gradient(135deg, var(--anime-pink), var(--anime-purple));
            color: white; border: none;
            font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 13px;
            padding: 8px 18px; border-radius: 4px;
            position: relative; overflow: hidden;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(255,45,120,0.35), inset 0 1px 0 rgba(255,255,255,0.2);
            text-decoration: none; display: inline-flex; align-items: center; gap: 6px; cursor: pointer;
        }
        .btn-anime-primary::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            transition: left 0.4s;
        }
        .btn-anime-primary:hover {
            transform: translateY(-2px) scale(1.03);
            box-shadow: 0 8px 25px rgba(255,45,120,0.5);
            color: white;
        }
        .btn-anime-primary:hover::before { left: 150%; }

        .btn-anime-danger {
            background: linear-gradient(135deg, #ff4444, #cc1100);
            color: white; border: none;
            font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 13px;
            padding: 8px 18px; border-radius: 4px; transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(255,50,50,0.3);
            text-decoration: none; display: inline-flex; align-items: center; gap: 6px; cursor: pointer;
        }
        .btn-anime-danger:hover {
            transform: translateY(-2px) scale(1.03);
            box-shadow: 0 8px 25px rgba(255,50,50,0.5); color: white;
        }

        .btn-sm-action {
            font-size: 11px; padding: 4px 10px; border-radius: 3px; font-weight: 700;
            display: inline-flex; align-items: center; gap: 4px;
        }

        /* ALERT */
        .anime-alert {
            background: linear-gradient(135deg, rgba(0,229,255,0.12), rgba(0,229,255,0.05));
            border: 1px solid var(--anime-cyan); border-left: 4px solid var(--anime-cyan);
            border-radius: 6px; padding: 10px 16px; color: var(--anime-cyan);
            font-weight: 700; font-size: 14px; margin-bottom: 16px;
            display: flex; align-items: center; gap: 8px;
            animation: slideInAlert 0.3s ease;
        }
        @keyframes slideInAlert {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* PANEL */
        .anime-panel {
            background: var(--anime-panel); border: 2px solid var(--anime-border);
            border-radius: 12px; overflow: hidden;
            box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,45,120,0.1);
            position: relative;
        }
        .anime-panel::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--anime-pink), var(--anime-purple), var(--anime-cyan));
        }

        /* TABLE */
        .table-anime { width: 100%; border-collapse: collapse; margin: 0; }

        .table-anime thead {
            background: linear-gradient(135deg, #1a0a2e, #0d0d2e);
            border-bottom: 2px solid var(--anime-pink);
        }
        .table-anime thead th {
            color: var(--anime-gold); font-family: 'Bangers', cursive;
            font-size: 15px; letter-spacing: 1.5px; padding: 14px 16px;
            text-align: left; white-space: nowrap; border: none;
        }
        .table-anime thead th:first-child { padding-left: 20px; }
        .table-anime thead th .th-inner { display: flex; align-items: center; gap: 6px; }
        .table-anime thead th .th-icon { color: var(--anime-pink); font-size: 13px; }

        .table-anime tbody tr {
            border-bottom: 1px solid var(--anime-border);
            transition: all 0.2s ease; position: relative; cursor: pointer;
            animation: fadeInRow 0.3s ease both;
        }
        .table-anime tbody tr:last-child { border-bottom: none; }
        .table-anime tbody tr:nth-child(even) { background: rgba(255,255,255,0.02); }

        .table-anime tbody tr:hover {
            background: linear-gradient(90deg, rgba(255,45,120,0.08), rgba(155,89,245,0.08));
            transform: scale(1.003);
            box-shadow: 0 2px 20px rgba(255,45,120,0.15);
        }
        .table-anime tbody tr:hover td:first-child::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
            background: linear-gradient(180deg, var(--anime-pink), var(--anime-purple));
            border-radius: 0 2px 2px 0;
        }

        .table-anime tbody td {
            padding: 12px 16px; color: var(--anime-text);
            font-size: 14px; font-weight: 600; vertical-align: middle; border: none; position: relative;
        }
        .table-anime tbody td:first-child { padding-left: 20px; }

        /* AVATAR */
        .char-avatar {
            width: 52px; height: 52px; object-fit: cover;
            border-radius: 6px; border: 2px solid var(--anime-purple);
            box-shadow: 0 0 10px rgba(155,89,245,0.4); transition: all 0.2s;
        }
        tr:hover .char-avatar {
            border-color: var(--anime-pink);
            box-shadow: 0 0 16px rgba(255,45,120,0.6); transform: scale(1.08);
        }
        .avatar-placeholder {
            width: 52px; height: 52px; border-radius: 6px;
            border: 2px dashed var(--anime-border);
            display: flex; align-items: center; justify-content: center;
            color: var(--anime-muted); font-size: 20px;
        }

        .char-name { font-weight: 800; color: #ffffff; }
        .char-surname { color: var(--anime-muted); font-size: 13px; }

        .badge-opera {
            background: linear-gradient(135deg, rgba(0,229,255,0.15), rgba(0,229,255,0.05));
            border: 1px solid rgba(0,229,255,0.35); color: var(--anime-cyan);
            font-size: 11px; font-weight: 700; padding: 3px 8px;
            border-radius: 20px; letter-spacing: 0.3px; white-space: nowrap;
        }
        .badge-cat {
            background: linear-gradient(135deg, rgba(155,89,245,0.2), rgba(155,89,245,0.05));
            border: 1px solid rgba(155,89,245,0.35); color: var(--anime-purple);
            font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 20px;
        }

        .birthday-cell {
            display: flex; align-items: center; gap: 6px;
            color: var(--anime-muted); font-size: 13px;
        }
        .birthday-cell i { color: var(--anime-pink); }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--anime-muted); }
        .empty-state i { font-sizea: 48px; display: block; margin-bottom: 16px; opacity: 0.4; }
        .empty-state p { font-size: 16px; font-weight: 700; margin: 0; }

        @keyframes fadeInRow {
            from { opacity: 0; transform: translateX(-8px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .table-anime tbody tr:nth-child(1) { animation-delay: 0.05s; }
        .table-anime tbody tr:nth-child(2) { animation-delay: 0.10s; }
        .table-anime tbody tr:nth-child(3) { animation-delay: 0.15s; }
        .table-anime tbody tr:nth-child(4) { animation-delay: 0.20s; }
        .table-anime tbody tr:nth-child(5) { animation-delay: 0.25s; }

        .action-bar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
    </style>
</head>
<body>
<div class="page-wrapper">

    <!-- HEADER -->
    <div class="anime-header mb-4">
        <h1 class="anime-title">Lista Personaggi Anime</h1>
        <div class="subtitle-decoration">
            <div class="line"></div>
            <span>✦ Character Registry ✦</span>
            <div class="line right"></div>
        </div>
    </div>

    <!-- ACTION BAR -->
    <div class="action-bar">
        <a th:href="@{/new}" class="btn-anime-primary">
            <i class="bi bi-plus-circle-fill"></i> Nuovo Personaggio
        </a>
        <a th:href="@{/deleteAll}" class="btn-anime-danger">
            <i class="bi bi-trash3-fill"></i> Elimina Tutti
        </a>
    </div>

    <!-- ALERT -->
    <div class="anime-alert" th:if="${deleteCharacter != null}">
        <i class="bi bi-check-circle-fill"></i>
        Personaggio eliminato con successo!
    </div>

    <!-- TABLE PANEL -->
    <div class="anime-panel">
        <table class="table-anime">
            <thead>
                <tr>
                    <th><div class="th-inner"><i class="bi bi-image th-icon"></i> Immagine</div></th>
                    <th><div class="th-inner"><i class="bi bi-person-fill th-icon"></i> Nome</div></th>
                    <th><div class="th-inner"><i class="bi bi-person th-icon"></i> Cognome</div></th>
                    <th><div class="th-inner"><i class="bi bi-tv th-icon"></i> Opera</div></th>
                    <th><div class="th-inner"><i class="bi bi-tag-fill th-icon"></i> Categoria</div></th>
                    <th><div class="th-inner"><i class="bi bi-cake2 th-icon"></i> Compleanno</div></th>
                    <th><div class="th-inner"><i class="bi bi-gear-fill th-icon"></i> Azioni</div></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="c : ${characters}"
                    th:data-href="@{/characters(id=${c.id})}"
                    onclick="window.location.href = this.getAttribute('data-href');">
                    <td>
                        <img th:if="${c.immagine}" th:src="@{${c.immagine}}" alt="avatar" class="char-avatar">
                        <div th:unless="${c.immagine}" class="avatar-placeholder">
                            <i class="bi bi-person-bounding-box"></i>
                        </div>
                    </td>
                    <td><span class="char-name" th:text="${c.nome}"></span></td>
                    <td><span class="char-surname" th:text="${c.cognome}"></span></td>
                    <td><span class="badge-opera" th:text="${c.opera}"></span></td>
                    <td><span class="badge-cat" th:text="${c.categoria}"></span></td>
                    <td>
                        <div class="birthday-cell">
                            <i class="bi bi-cake2-fill"></i>
                            <span th:text="${c.compleanno}"></span>
                        </div>
                    </td>
                    <td onclick="event.stopPropagation();">
                        <a th:href="@{'/character/delete/'+${c.id}}" class="btn-anime-danger btn-sm-action">
                            <i class="bi bi-trash3-fill"></i> Elimina
                        </a>
                        <a th:href="@{'/character/edit/'+${c.id}}" class="btn-anime-primary btn-sm-action" style="margin-left:4px;">
                            <i class="bi bi-pencil-fill"></i> Modifica
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- EMPTY STATE -->
    <div class="empty-state" th:if="${#lists.isEmpty(characters)}">
        <i class="bi bi-wind"></i>
        <p>Nessun personaggio trovato.</p>
    </div>

</div>
<script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
