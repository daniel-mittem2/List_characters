<!DOCTYPE html>
<html xmlns="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">
    <title>Characters List</title>
</head>
<body>
    <div>
        <a th:href="@{/new}" class="btn btn-primary btn-sm">Nuovo personaggio anime</a>
    
        <a th:href="@{/deleteAll}" class="btn btn-danger btn-sm">Elimina tutti i personaggi</a>
    </div>

    <div>
        <div class="alert alert-success" role="alert" th:if="${deleteCharacter != null}">
            Personaggio eliminato
        </div>
    </div>

    <header>
        <h2>Lista personaggi anime</h2>
    </header>

    <div>
        <table class="table table-striped table-bordered table-hover">
            <thead>
                <th class="table-primary">
                    Immagine
                </th>
                <th>
                    Nome
                </th>
                <th>
                    Cognome
                </th>
                <th>
                    Opera
                </th>
                <th>
                    Categoria
                </th>
                <th>
                    Data di compleanno
                </th>
                <th>
                    Dettagli
                </th>
            </thead>

            <tbody>
                <tr th:each="c : ${characters}" style="cursor: pointer;" th:data-href="@{/characters(id=${c.id})}" onclick="window.location.href = this.getAttribute('data-href');">
                    <td>
                        <img th:if="${c.immagine}" th:src="@{${c.immagine}}" alt="immagine" style="width: 60px; height: 60px; object-fit: cover;">
                    </td>
                    <td th:text="${c.nome}"></td>
                    <td th:text="${c.cognome}"></td>
                    <td th:text="${c.opera}"></td>
                    <td th:text="${c.categoria}"></td>
                    <td th:text="${c.compleanno}"></td>

                    <!-- Altre opzioni future-->
                    <td onclick="event.stopPropagation();">
                        <a th:href="@{'/character/delete/'+${c.id}}" class="btn btn-danger btn-sm">Elimina</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <p th:if="${#lists.isEmpty(characters)}">
        Nessun personaggio trovato.
    </p>

    <script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
