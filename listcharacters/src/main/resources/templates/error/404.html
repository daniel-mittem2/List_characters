<!DOCTYPE html>
<html lang="it" xmlns="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <title>404 - Jutsu fallito</title>
    <style>
        body { background: #0d0d1a; }
        .kanji { font-size: 96px; line-height: 1; color: #3b2fa0; user-select: none; }
        .error-code { font-size: 72px; font-weight: 700; letter-spacing: -2px;
            background: linear-gradient(135deg, #6d5fd4, #c4b5fd);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .divider { width: 40px; height: 2px; background: #3b2fa0; margin: 1rem auto; border-radius: 99px; }
        .badge-cat { background: #3b1fa0; color: #c4b5fd; font-size: 11px; padding: 3px 10px; border-radius: 99px; }
    </style>
</head>
<body>

<div class="d-flex align-items-center justify-content-center" style="min-height:100vh;">
    <div class="text-center px-3">

        <div class="kanji mb-1">迷子</div>

        <div class="error-code">404</div>

        <div class="divider"></div>

        <span class="badge-cat mb-3 d-inline-block">Jutsu fallito</span>

        <h2 class="fw-medium mb-1" style="color:#c4b5fd; font-size:18px;">Questa pagina non esiste in nessuna dimensione</h2>
        <p class="mb-1" style="color:#7c75b5; font-size:13px;">Neanche il Rinnegan di Nagato riesce a trovarla.</p>

        <a th:href="@{/}" class="btn btn-sm fw-medium" style="background:#6d5fd4; color:#fff; font-size:13px;">⛩ Torna al villaggio</a>

    </div>
</div>

<script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
